<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calder Anderson</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400&family=Geist+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #fff; --fg: #000; --hover: #0000FF;
  --mid: #999; --light: #ddd;
  --font: 'Geist','Helvetica Neue',Arial,sans-serif;
  --mono: 'Geist Mono',monospace;
}
html, body { width:100%; height:100%; background:#fff; font-family:var(--font); overflow:hidden; user-select:none; }

#header { position:fixed; top:26px; left:34px; z-index:200; pointer-events:none; }
#header h1 { font-size:0.8rem; font-weight:400; line-height:1.6; color:#000; }
#header span { font-family:var(--mono); font-size:0.68rem; color:var(--mid); }

#toggle { position:fixed; top:26px; right:34px; z-index:200; display:flex; border:1px solid #000; }
#toggle button {
  background:none; border:none; cursor:pointer; padding:6px 16px;
  font-family:var(--mono); font-size:0.6rem; letter-spacing:0.12em;
  text-transform:uppercase; color:var(--mid);
}
#toggle button + button { border-left:1px solid #000; }
#toggle button.active { background:#000; color:#fff; }
#toggle button:not(.active):hover { color:#000; }

#hint { position:fixed; bottom:26px; right:34px; z-index:200; font-family:var(--mono); font-size:0.58rem; color:var(--light); pointer-events:none; }
#meta { position:fixed; bottom:26px; left:34px; z-index:200; font-family:var(--mono); font-size:0.58rem; color:var(--light); pointer-events:none; }

#tooltip {
  position:fixed; z-index:300; pointer-events:none;
  opacity:0; transition:opacity 0.12s;
  display:flex; flex-direction:column; align-items:center;
}
#tooltip.show { opacity:1; }
#tt-name { font-size:0.7rem; font-weight:400; color:var(--hover); white-space:nowrap; }
#tt-tag  { font-family:var(--mono); font-size:0.55rem; color:var(--hover); text-transform:uppercase; letter-spacing:0.1em; margin-top:2px; white-space:nowrap; }

#net-canvas { position:fixed; inset:0; display:block; cursor:default; }

#scatter-view { position:fixed; inset:0; z-index:10; display:none; overflow:hidden; }
.s-item { position:absolute; cursor:pointer; text-decoration:none; line-height:1.2; color:#000; transition:color 0.12s; }
.s-item:hover { color:var(--hover) !important; }
.s-name { display:block; font-weight:400; white-space:nowrap; }
.s-tag  { display:block; font-family:var(--mono); font-size:0.55em; color:var(--mid); text-transform:uppercase; letter-spacing:0.08em; margin-top:2px; opacity:0; transition:opacity 0.12s; }
.s-item:hover .s-tag { opacity:1; color:var(--hover); }

/* ── SLIDESHOW ── */
.slideshow {
  position: relative;
  width: 100%;
  margin-bottom: 3px;
  background: #f0f0f0;
  overflow: hidden;
  user-select: none;
}
.slideshow-track {
  display: flex;
  transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
  will-change: transform;
}
.slideshow-track img {
  width: 100%;
  flex-shrink: 0;
  display: block;
  object-fit: cover;
}
.slideshow-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: #fff;
  border: none;
  cursor: pointer;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.8rem;
  color: #000;
  z-index: 10;
  opacity: 0;
  transition: opacity 0.15s;
}
.slideshow:hover .slideshow-btn { opacity: 1; }
.slideshow-btn.prev { left: 16px; }
.slideshow-btn.next { right: 16px; }
.slideshow-btn:hover { background: #0000FF; color: #fff; }
.slideshow-counter {
  position: absolute;
  bottom: 14px;
  right: 18px;
  font-family: 'Geist Mono', monospace;
  font-size: 0.58rem;
  letter-spacing: 0.1em;
  color: #fff;
  background: rgba(0,0,0,0.35);
  padding: 3px 8px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
}
.slideshow:hover .slideshow-counter { opacity: 1; }
.slideshow-dots {
  position: absolute;
  bottom: 14px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 5px;
  pointer-events: none;
}
.slideshow-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: rgba(255,255,255,0.5);
  transition: background 0.15s;
}
.slideshow-dot.active { background: #fff; }

</style>
</head>
<body>

<div id="header">
  <h1>Calder Anderson</h1>
  <span>artist · designer · publisher — new york</span>
</div>
<div id="toggle">
  <button id="btn-net" class="active" onclick="setView('network')">Network</button>
  <button id="btn-scatter" onclick="setView('scatter')">Index</button>
</div>
<div id="hint">drag · click to open</div>
<div id="meta">2026</div>

<canvas id="net-canvas"></canvas>
<div id="tooltip"><div id="tt-name"></div><div id="tt-tag"></div></div>
<div id="scatter-view"></div>

<script>
// ─────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────
const PROJECTS = [
  { id:0, label:'Login Magazine',     tag:'print · publishing',    url:'#login-magazine', r:14, group:'print'   },
  { id:1, label:'Graphic Work',       tag:'design · typography',   url:'#graphic',        r:9,  group:'design'  },
  { id:2, label:'Photography',        tag:'image · documentation', url:'#photography',    r:9,  group:'image'   },
  { id:3, label:'ULTRANET',           tag:'moving image · space',  url:'ultranet.html',   r:10, group:'image'   },
  { id:4, label:'Music Production',   tag:'sound · composition',   url:'#music',          r:8,  group:'sound'   },
  { id:5, label:'Styling',            tag:'fashion · editorial',   url:'#styling',        r:8,  group:'fashion' },
  { id:6, label:'Are You Coming to The Party?',       tag:'print · ephemera',      url:'are_you_coming_to_the_party_web/html/aycttp.html',          r:9,  group:'print'   },
  { id:7, label:'Internet Culture',   tag:'theory · research',     url:'#research',       r:7,  group:'theory'  },
  { id:8, label:'Collaborations',     tag:'ryka ali · others',     url:'#collabs',        r:8,  group:'collab'  },
  { id:9, label:'About',              tag:'context · contact',     url:'#about',          r:6,  group:'info'    },
];

const EDGES = [
  [0,1],[0,2],[0,5],[0,6],[0,8],
  [1,3],[1,6],[1,7],
  [2,3],[2,5],[2,8],
  [3,4],[3,7],
  [4,7],[4,8],
  [5,8],[5,6],
  [6,7],[7,9],[8,9],[0,9],
];

// ─────────────────────────────────────────────
// CANVAS — RETINA AWARE
// ─────────────────────────────────────────────
const canvas = document.getElementById('net-canvas');
const ctx    = canvas.getContext('2d');
let DPR      = 1;

function resizeCanvas() {
  DPR = window.devicePixelRatio || 1;
  canvas.width  = window.innerWidth  * DPR;
  canvas.height = window.innerHeight * DPR;
  canvas.style.width  = window.innerWidth  + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}

// ─────────────────────────────────────────────
// PHYSICS STATE  (all coords = CSS pixels)
// ─────────────────────────────────────────────
let pos = [];        // { x, y, vx, vy }
let dragIdx    = -1;
let dragTX     = 0, dragTY = 0;   // cursor target for pinned node
let dragMoved  = false;
let hoveredIdx = -1;
let simRunning = false;

// Spring constants
const K_SPRING    = 0.028;
const REST_LEN    = 380;
const DAMPING     = 0.76;
const PIN_K       = 0.50;
const K_REPULSE   = 26000;
const REPULSE_R   = 300;

function initPositions() {
  const W = window.innerWidth, H = window.innerHeight;
  const cx = W / 2, cy = H / 2;
  const spread = Math.min(W * 0.88, H * 0.88) * 0.50;
  const seeds  = [0, 0.12, 0.22, 0.08, 0.18, 0.05, 0.15, 0.25, 0.03, 0.20];
  pos = PROJECTS.map((p, i) => {
    const angle  = (i / PROJECTS.length) * Math.PI * 2 - Math.PI / 2;
    const dist   = (p.id === 0) ? spread * 0.08 : spread * (0.72 + seeds[i] * 0.32);
    const jitter = (p.id === 0) ? 0 : (seeds[i] - 0.12) * spread * 0.5;
    return { x: cx + Math.cos(angle)*dist + jitter, y: cy + Math.sin(angle)*dist + jitter*0.6, vx:0, vy:0 };
  });
}

// ─────────────────────────────────────────────
// SIMULATION LOOP
// ─────────────────────────────────────────────
function simStep() {
  const W = window.innerWidth, H = window.innerHeight;
  const margin = 60;

  // Pin dragged node toward cursor
  if (dragIdx >= 0) {
    const p = pos[dragIdx];
    p.vx += (dragTX - p.x) * PIN_K;
    p.vy += (dragTY - p.y) * PIN_K;
  }

  // Spring forces along edges
  EDGES.forEach(([ai, bi]) => {
    const a = pos[ai], b = pos[bi];
    const dx = b.x - a.x, dy = b.y - a.y;
    const d  = Math.sqrt(dx*dx + dy*dy) || 1;
    const f  = (d - REST_LEN) * K_SPRING;
    const fx = (dx / d) * f, fy = (dy / d) * f;
    a.vx += fx; a.vy += fy;
    b.vx -= fx; b.vy -= fy;
  });

  // Repulsion — prevents nodes crowding together
  const N = PROJECTS.length;
  for (let i = 0; i < N; i++) {
    for (let j = i + 1; j < N; j++) {
      const a = pos[i], b = pos[j];
      const dx = a.x - b.x, dy = a.y - b.y;
      const d2 = dx*dx + dy*dy || 1;
      const d  = Math.sqrt(d2);
      if (d < REPULSE_R) {
        const f  = K_REPULSE / (d2 * d);
        const fx = dx * f, fy = dy * f;
        a.vx += fx; a.vy += fy;
        b.vx -= fx; b.vy -= fy;
      }
    }
  }

  // Weak centering pull so the graph doesn't drift off screen
  const cx = W / 2, cy = H / 2;
  pos.forEach(p => {
    p.vx += (cx - p.x) * 0.0005;
    p.vy += (cy - p.y) * 0.0005;
  });

  // Integrate + damp + clamp
  let anyMoving = false;
  pos.forEach(p => {
    p.vx *= DAMPING;
    p.vy *= DAMPING;
    p.x   = Math.max(margin, Math.min(W - margin, p.x + p.vx));
    p.y   = Math.max(margin, Math.min(H - margin, p.y + p.vy));
    if (Math.abs(p.vx) > 0.04 || Math.abs(p.vy) > 0.04) anyMoving = true;
  });

  draw();

  if (anyMoving || dragIdx >= 0) {
    requestAnimationFrame(simStep);
  } else {
    simRunning = false;
  }
}

function kickSim() {
  if (!simRunning) {
    simRunning = true;
    requestAnimationFrame(simStep);
  }
}

// ─────────────────────────────────────────────
// DRAW
// ─────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
const ttName  = document.getElementById('tt-name');
const ttTag   = document.getElementById('tt-tag');

function draw() {
  const W = window.innerWidth, H = window.innerHeight;
  ctx.clearRect(0, 0, W, H);

  // Edges
  EDGES.forEach(([ai, bi]) => {
    const a = pos[ai], b = pos[bi];
    const active = (ai === hoveredIdx || bi === hoveredIdx);
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = active ? '#0000FF' : '#d0d0d0';
    ctx.lineWidth   = active ? 1 : 0.8;
    ctx.stroke();
  });

  // Nodes
  PROJECTS.forEach((p, i) => {
    const { x, y } = pos[i];
    const hov = (i === hoveredIdx);
    ctx.beginPath();
    ctx.arc(x, y, p.r * (hov ? 1.3 : 1), 0, Math.PI * 2);
    ctx.fillStyle = hov ? '#0000FF' : '#000';
    ctx.fill();
  });

  // Tooltip
  if (hoveredIdx >= 0) {
    const p = PROJECTS[hoveredIdx];
    const { x, y } = pos[hoveredIdx];
    tooltip.style.left      = x + 'px';
    tooltip.style.top       = (y + p.r * 1.3 + 10) + 'px';
    tooltip.style.transform = 'translateX(-50%)';
    ttName.textContent = p.label;
    ttTag.textContent  = p.tag;
    tooltip.classList.add('show');
  } else {
    tooltip.classList.remove('show');
  }
}

// ─────────────────────────────────────────────
// HIT TEST
// ─────────────────────────────────────────────
function hitTest(mx, my) {
  for (let i = PROJECTS.length - 1; i >= 0; i--) {
    const dx = mx - pos[i].x, dy = my - pos[i].y;
    if (dx*dx + dy*dy <= (PROJECTS[i].r + 6) ** 2) return i;
  }
  return -1;
}

// ─────────────────────────────────────────────
// INPUT
// ─────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
  const mx = e.clientX, my = e.clientY;

  if (dragIdx >= 0) {
    const dx = mx - dragTX, dy = my - dragTY;
    if (Math.abs(dx) > 2 || Math.abs(dy) > 2) dragMoved = true;
    dragTX = mx; dragTY = my;
    kickSim();
    canvas.style.cursor = 'grabbing';
  } else {
    const hit = hitTest(mx, my);
    if (hit !== hoveredIdx) {
      hoveredIdx = hit;
      draw();
    }
    canvas.style.cursor = hit >= 0 ? 'pointer' : 'default';
  }
});

canvas.addEventListener('mousedown', e => {
  const hit = hitTest(e.clientX, e.clientY);
  if (hit >= 0) {
    dragIdx   = hit;
    dragTX    = e.clientX;
    dragTY    = e.clientY;
    dragMoved = false;
    // Give the grabbed node a zero velocity so it doesn't lurch
    pos[hit].vx = 0;
    pos[hit].vy = 0;
    canvas.style.cursor = 'grabbing';
    e.preventDefault();
    kickSim();
  }
});

window.addEventListener('mouseup', () => {
  if (dragIdx >= 0) {
    const wasMoved = dragMoved;
    const idx = dragIdx;
    dragIdx = -1;
    canvas.style.cursor = 'default';
    kickSim(); // let it settle
    if (!wasMoved) navigateTo(PROJECTS[idx].url);
  }
});

canvas.addEventListener('mouseleave', () => {
  if (dragIdx < 0) { hoveredIdx = -1; draw(); }
});

// Touch
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  const hit = hitTest(t.clientX, t.clientY);
  if (hit >= 0) {
    dragIdx = hit; dragTX = t.clientX; dragTY = t.clientY; dragMoved = false;
    pos[hit].vx = 0; pos[hit].vy = 0;
    kickSim();
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (dragIdx < 0) return;
  const t = e.touches[0];
  const dx = t.clientX - dragTX, dy = t.clientY - dragTY;
  if (Math.abs(dx) > 2 || Math.abs(dy) > 2) dragMoved = true;
  dragTX = t.clientX; dragTY = t.clientY;
  kickSim();
}, { passive: false });

canvas.addEventListener('touchend', () => {
  if (dragIdx >= 0) {
    const wasMoved = dragMoved, idx = dragIdx;
    dragIdx = -1; kickSim();
    if (!wasMoved) navigateTo(PROJECTS[idx].url);
  }
});

// ─────────────────────────────────────────────
// SCATTER INDEX VIEW
// ─────────────────────────────────────────────
const GROUP_CENTERS = {
  print:   { bx:0.14, by:0.22 },
  design:  { bx:0.42, by:0.14 },
  image:   { bx:0.68, by:0.20 },
  sound:   { bx:0.76, by:0.52 },
  fashion: { bx:0.56, by:0.68 },
  theory:  { bx:0.26, by:0.72 },
  collab:  { bx:0.52, by:0.42 },
  info:    { bx:0.82, by:0.80 },
};
const SCATTER_META = [
  { fs:'1.6rem',  ox: 0,   oy: 0   },
  { fs:'0.85rem', ox: 55,  oy: 30  },
  { fs:'1.1rem',  ox: 0,   oy: 0   },
  { fs:'0.78rem', ox: 35,  oy:-22  },
  { fs:'0.9rem',  ox: 0,   oy: 0   },
  { fs:'0.82rem', ox:-28,  oy: 22  },
  { fs:'0.95rem', ox: 28,  oy:-28  },
  { fs:'0.75rem', ox:-36,  oy: 18  },
  { fs:'0.88rem', ox: 18,  oy: 10  },
  { fs:'0.72rem', ox: 0,   oy: 0   },
];

function buildScatter() {
  const el  = document.getElementById('scatter-view');
  const W = window.innerWidth, H = window.innerHeight, pad = 90;
  el.innerHTML = '';
  PROJECTS.forEach((p, i) => {
    const gc   = GROUP_CENTERS[p.group];
    const meta = SCATTER_META[i];
    const x = Math.max(pad, Math.min(W - pad, gc.bx * (W - pad*2) + pad + meta.ox));
    const y = Math.max(pad, Math.min(H - pad, gc.by * (H - pad*2) + pad + meta.oy));
    const a = document.createElement('a');
    a.className = 's-item';
    a.href = p.url;
    a.style.cssText = `left:${x}px;top:${y}px;font-size:${meta.fs}`;
    a.innerHTML = `<span class="s-name">${p.label}</span><span class="s-tag">${p.tag}</span>`;
    el.appendChild(a);
  });
}

// ─────────────────────────────────────────────
// VIEW TOGGLE
// ─────────────────────────────────────────────
let currentView = 'network';
function setView(v) {
  currentView = v;
  document.getElementById('btn-net').classList.toggle('active', v === 'network');
  document.getElementById('btn-scatter').classList.toggle('active', v === 'scatter');
  document.getElementById('hint').textContent = v === 'network' ? 'drag · click to open' : 'click to open';
  const sv = document.getElementById('scatter-view');
  if (v === 'network') {
    sv.style.display = 'none';
    canvas.style.display = 'block';
    tooltip.style.display = '';
    draw();
  } else {
    canvas.style.display = 'none';
    tooltip.style.display = 'none';
    sv.style.display = 'block';
    buildScatter();
  }
}

// ─────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────
function init() {
  resizeCanvas();
  initPositions();
  draw();
}

window.addEventListener('resize', () => {
  resizeCanvas();
  initPositions();
  if (currentView === 'network') draw();
  else buildScatter();
});

init();
</script>

<!-- ─────────────────────────────────────────────

───────────────────────────────────────────── -->
<div id="project-page" style="
  position:fixed; inset:0; background:#fff; z-index:500;
  display:none; overflow-y:auto;
  font-family:'Geist','Helvetica Neue',Arial,sans-serif;
">
  <!-- Back button -->
  <div style="position:fixed; top:26px; left:34px; z-index:600;">
    <button onclick="navigateTo('#')" style="
      background:none; border:none; cursor:pointer; padding:0;
      font-family:'Geist Mono',monospace; font-size:0.6rem;

      display:flex; align-items:center; gap:8px;
    ">← back</button>
  </div>

  <!-- Project content -->
  <div id="project-content" style="

  ">
    <div id="proj-header" style="margin-bottom:64px;">
      <p id="proj-tag" style="
        font-family:'Geist Mono',monospace; font-size:0.62rem;

        margin-bottom:16px;
      "></p>
      <h1 id="proj-title" style="
        font-size:clamp(2rem, 5vw, 3.8rem); font-weight:400;
        line-height:1.08; letter-spacing:-0.02em; color:#000;
      "></h1>
    </div>

    <!-- Media blocks — rendered dynamically from PAGE_DATA -->
    <div id="proj-media" style="margin-bottom:72px;"></div>

    <div style="display:grid; grid-template-columns:200px 1fr; gap:60px; align-items:start; border-top:1px solid #f0f0f0; padding-top:48px;">
      <div>
        <p style="font-family:'Geist Mono',monospace; font-size:0.6rem; letter-spacing:0.14em; text-transform:uppercase; color:#999; margin-bottom:12px;">Year</p>

        <p id="proj-tag2" style="font-family:'Geist Mono',monospace; font-size:0.72rem; color:#000;"></p>
      </div>

        <p id="proj-desc" style="font-size:1.05rem; line-height:1.8; color:#000; font-weight:300; max-width:640px;"></p>

</div>

<script>
// ─────────────────────────────────────────────
// PROJECT DATA — fill in your actual content
// ─────────────────────────────────────────────
const PAGE_DATA = {
  'login-magazine': {
    title: 'Login Magazine',
    tag: 'print · publishing',
    year: '2024–2025',
    desc: 'Login Magazine is an independent print publication exploring internet culture, digital identity, and the aesthetics of networked life. Issue 001 launched in early 2025 with a limited print run.',
    media: [
      // Two images side by side
      { type: 'image-grid', images: ['images/login-01.jpg', 'images/login-02.jpg'] },
      // Single full-width image
      { type: 'image', src: 'images/login-03.jpg' },
    ],
  },
  'graphic': {
    title: 'Graphic Work',
    tag: 'design · typography',
    year: '2022–present',
    desc: 'A body of graphic design work spanning editorial layouts, identity systems, and typographic experiments.',
    media: [
      { type: 'image-grid', images: ['images/graphic-01.jpg', 'images/graphic-02.jpg'] },
      { type: 'image', src: 'images/graphic-03.jpg' },
    ],
  },
  'photography': {
    title: 'Photography',
    tag: 'image · documentation',
    year: '2021–present',
    desc: 'Documentary and editorial photography focused on nightlife, fashion, and the texture of everyday life in New York City.',
    media: [
      // Slideshow — add as many images as you like, aspect ratio is optional (default 3/2)
      { type: 'slideshow', aspect: '3/2', images: ['images/photo-01.jpg', 'images/photo-02.jpg', 'images/photo-03.jpg', 'images/photo-04.jpg'] },
      { type: 'image-grid', images: ['images/photo-05.jpg', 'images/photo-06.jpg'] },

// ─────────────────────────────────────────────
// MEDIA RENDERER
// ─────────────────────────────────────────────
function renderMedia(mediaArr) {
  const container = document.getElementById('proj-media');
  container.innerHTML = '';

  const imgStyle = 'width:100%; display:block; object-fit:cover;';
  const gap = '3px';

  (mediaArr || []).forEach(block => {
    let el;

    if (block.type === 'image') {
      el = document.createElement('div');
      el.style.cssText = 'margin-bottom:3px;';
      el.innerHTML = `<img src="${block.src}" style="${imgStyle} aspect-ratio:auto;" loading="lazy" onerror="this.parentElement.style.background='#f0f0f0'; this.parentElement.style.aspectRatio='16/9'; this.remove();">`;

    } else if (block.type === 'image-grid') {
      el = document.createElement('div');
      el.style.cssText = `display:grid; grid-template-columns:repeat(${block.images.length},1fr); gap:${gap}; margin-bottom:3px;`;
      block.images.forEach(src => {
        el.innerHTML += `<img src="${src}" style="${imgStyle} aspect-ratio:4/3;" loading="lazy" onerror="this.style.background='#f0f0f0'; this.removeAttribute('src');">`;
      });

    } else if (block.type === 'vimeo') {
      el = document.createElement('div');
      el.style.cssText = 'position:relative; padding-bottom:56.25%; height:0; overflow:hidden; margin-bottom:3px; background:#f0f0f0;';
      el.innerHTML = `<iframe src="https://player.vimeo.com/video/${block.id}?title=0&byline=0&portrait=0&color=0000ff" style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;" allow="autoplay; fullscreen" allowfullscreen></iframe>`;

    } else if (block.type === 'youtube') {
      el = document.createElement('div');
      el.style.cssText = 'position:relative; padding-bottom:56.25%; height:0; overflow:hidden; margin-bottom:3px; background:#f0f0f0;';
      el.innerHTML = `<iframe src="https://www.youtube.com/embed/${block.id}" style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;

    } else if (block.type === 'video') {
      el = document.createElement('div');
      el.style.cssText = 'margin-bottom:3px;';
      el.innerHTML = `<video src="${block.src}" ${block.poster ? `poster="${block.poster}"` : ''} controls style="width:100%; display:block;"></video>`;

    } else if (block.type === 'soundcloud') {
      el = document.createElement('div');
      el.style.cssText = 'margin-bottom:24px;';
      const encodedUrl = encodeURIComponent(block.url);
      el.innerHTML = `<iframe width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=${encodedUrl}&color=%230000ff&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false"></iframe>`;


    } else if (block.type === 'slideshow') {
      el = document.createElement('div');
      el.className = 'slideshow';
      const aspect = block.aspect || '3/2';
      const imgs = block.images || [];
      el.innerHTML = `
        <div class="slideshow-track" style="aspect-ratio:${aspect}">
          ${imgs.map(src => `<img src="${src}" style="aspect-ratio:${aspect};" loading="lazy" onerror="this.style.background='#e8e8e8'; this.removeAttribute('src');">`).join('')}
        </div>
        <button class="slideshow-btn prev" aria-label="Previous">←</button>
        <button class="slideshow-btn next" aria-label="Next">→</button>
        <div class="slideshow-counter">1 / ${imgs.length}</div>
        <div class="slideshow-dots">
          ${imgs.map((_, i) => `<div class="slideshow-dot ${i===0?'active':''}"></div>`).join('')}
        </div>
      `;
      // Wire up interactivity after appending
      requestAnimationFrame(() => {
        const track   = el.querySelector('.slideshow-track');
        const counter = el.querySelector('.slideshow-counter');
        const dots    = el.querySelectorAll('.slideshow-dot');
        const total   = imgs.length;
        let current   = 0;

        function goTo(n) {
          current = ((n % total) + total) % total;
          track.style.transform = `translateX(-${current * 100}%)`;
          counter.textContent = `${current + 1} / ${total}`;
          dots.forEach((d, i) => d.classList.toggle('active', i === current));
        }

        el.querySelector('.prev').addEventListener('click', e => { e.stopPropagation(); goTo(current - 1); });
        el.querySelector('.next').addEventListener('click', e => { e.stopPropagation(); goTo(current + 1); });

        // Keyboard navigation when hovering
        el.setAttribute('tabindex', '0');
        el.addEventListener('keydown', e => {
          if (e.key === 'ArrowLeft')  goTo(current - 1);
          if (e.key === 'ArrowRight') goTo(current + 1);
        });

        // Touch swipe
        let touchX = 0;
        el.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, { passive: true });
        el.addEventListener('touchend',   e => {
          const dx = e.changedTouches[0].clientX - touchX;
          if (Math.abs(dx) > 40) goTo(dx < 0 ? current + 1 : current - 1);
        });
      });

    } else if (block.type === 'bandcamp') {
      el = document.createElement('div');
      el.style.cssText = 'margin-bottom:24px;';
      el.innerHTML = `<iframe style="border:0; width:100%; height:120px;" src="${block.src}" seamless></iframe>`;
    }

    if (el) container.appendChild(el);
  });
}

// ─────────────────────────────────────────────
// HASH ROUTER
// ─────────────────────────────────────────────
function navigateTo(hash) {
  if (!hash.startsWith('#')) {
    window.location.href = hash;
    return;
  }
  window.location.hash = hash.replace('#','') ? hash : '';
  handleRoute();
}

function handleRoute() {
  const hash = window.location.hash.replace('#','').trim();
  const page = document.getElementById('project-page');
  const netView = document.getElementById('network-view');
  const scatterView = document.getElementById('scatter-view');
  const toggle = document.getElementById('toggle');
  const header = document.getElementById('header');
  const hint   = document.getElementById('hint');
  const meta   = document.getElementById('meta');

  if (hash && PAGE_DATA[hash]) {
    // Show project page
    const d = PAGE_DATA[hash];
    document.getElementById('proj-title').textContent = d.title;
    document.getElementById('proj-tag').textContent   = d.tag;
    document.getElementById('proj-tag2').textContent  = d.tag;
    document.getElementById('proj-year').textContent  = d.year;
    document.getElementById('proj-desc').textContent  = d.desc;
    renderMedia(d.media);
    page.style.display = 'block';
    netView.style.display = 'none';
    scatterView.style.display = 'none';
    toggle.style.display = 'none';
    hint.style.display   = 'none';
    meta.style.display   = 'none';
    header.style.display = 'none';
    window.scrollTo(0, 0);
  } else {
    // Show network
    page.style.display = 'none';
    toggle.style.display = '';
    hint.style.display   = '';
    meta.style.display   = '';
    header.style.display = '';
    // Restore last view
    if (typeof currentView !== 'undefined') setView(currentView);
    else { netView.style.display = ''; }
  }
}

window.addEventListener('hashchange', handleRoute);
window.addEventListener('DOMContentLoaded', handleRoute);
handleRoute();
</script>
